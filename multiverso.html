<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Missão Multiverso</title>

<style>

body{
    background:#111;
    color:#00ff88;
    font-family:Consolas, monospace;
    text-align:center;
    padding:40px;
    line-height:1.6;
}

.container{
    max-width:1000px;
    margin:auto;
}

h1{
    color:#00ff88;
    margin-bottom:25px;
}

img{
    width:90%;
    max-width:850px;
    border:2px solid #00ff88;
    border-radius:12px;
    margin-bottom:35px;
}

input{
    width:320px;
    padding:12px;
    font-size:18px;
    text-align:center;
    background:#222;
    color:white;
    border:2px solid #00ff88;
    border-radius:8px;
}

button{

    margin-top:20px;
    padding:12px 30px;
    font-size:18px;
    cursor:pointer;
    border:none;
    border-radius:8px;
    background:#00ff88;
    color:#111;
    font-weight:bold;

}

button:hover{

background:#00cc6a;

}

#resultado{

margin-top:30px;
font-size:18px;

}

</style>

</head>

<body>

<div class="container">

<h1>🌍 Missão Multiverso</h1>

<img src="images/multiverso.png">

<br>

<input id="codigo" placeholder="Introduz a resposta">

<br>

<button onclick="verificar()">VALIDAR</button>

<div id="resultado"></div>

</div>

<script>

function verificar(){

let resposta=document.getElementById("codigo").value
.trim()
.toUpperCase()
.replace(/\s+/g,'');

if(resposta=="ANIMEHUNTER"){

document.getElementById("resultado").innerHTML=`

<h2>🏆 Achievement Unlocked</h2>

<p>

Parabéns, missão concluída!<br>
Conseguiste estabilizar o Multiverso.<br>
A mensagem escondida foi descoberta.

</p>

`;

}

else{

document.getElementById("resultado").innerHTML=`

<h2>❌ MISSÃO INCOMPLETA</h2>

<p>

Ainda não encontraste a mensagem escondida.<br>
Observa melhor a grelha.<br>
Cada detalhe pode fazer a diferença.

</p>

`;

}

}

</script>

</body>
</html>
